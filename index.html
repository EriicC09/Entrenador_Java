<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d12">
<title>Entrenador Java</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0d12;
  --s1:      #16161f;
  --s2:      #1e1e2a;
  --s3:      #252535;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --acc:     #6ee7b7;
  --acc2:    #34d399;
  --purple:  #a78bfa;
  --amber:   #fbbf24;
  --red:     #f87171;
  --blue:    #60a5fa;
  --text:    #e8f5f0;
  --muted:   #6b7a72;
  --mono:    'JetBrains Mono', monospace;
  --head:    'Syne', sans-serif;
  --body:    'DM Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── NAV BAR ── */
nav{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0}
nav button{flex:1;padding:12px 4px 10px;background:none;border:none;color:var(--muted);font-family:var(--body);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s;border-bottom:2px solid transparent;position:relative}
nav button .ico{font-size:20px;line-height:1}
nav button.active{color:var(--acc);border-bottom-color:var(--acc)}
nav button:active{background:var(--s2)}

/* ── SCREENS ── */
.screen{display:none;flex:1;overflow:hidden;flex-direction:column}
.screen.active{display:flex}

/* ══════════════════════════════
   HOME SCREEN
══════════════════════════════ */
#sc-home{overflow-y:auto;padding:1.25rem 1rem 5rem}
.home-header{margin-bottom:1.5rem}
.home-header h1{font-family:var(--head);font-size:26px;font-weight:800;letter-spacing:-0.5px;line-height:1.1}
.home-header h1 span{color:var(--acc)}
.home-header p{font-size:13px;color:var(--muted);margin-top:6px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.stat-card .n{font-family:var(--mono);font-size:24px;font-weight:600;color:var(--acc)}
.stat-card .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.6rem;padding-left:2px;font-family:var(--head)}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.topic-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px 12px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden}
.topic-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--bar-color,var(--acc));opacity:.4;border-radius:14px 14px 0 0}
.topic-card:active{background:var(--s2)}
.topic-card .ico{font-size:22px;margin-bottom:8px;display:block}
.topic-card .name{font-family:var(--head);font-size:13px;font-weight:700;line-height:1.3}
.topic-card .sub{font-size:11px;color:var(--muted);margin-top:3px}
.topic-card .badge{position:absolute;top:10px;right:10px;font-size:10px;font-family:var(--mono);color:var(--acc);background:rgba(110,231,183,.1);padding:2px 7px;border-radius:20px}

/* ══════════════════════════════
   EXERCISE SCREEN
══════════════════════════════ */
#sc-exercise{flex-direction:column}
.ex-topbar{display:flex;align-items:center;gap:8px;padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--s1)}
.back-btn{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--text);cursor:pointer;white-space:nowrap}
.ex-tag{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.3px;white-space:nowrap}
.dots{display:flex;gap:4px;margin-left:auto}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.dot.on{background:var(--acc)}
.ex-body{flex:1;overflow-y:auto;padding:1rem}
.ex-q{font-size:15px;line-height:1.65;margin-bottom:1rem}
pre.code{background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:.875rem;font-family:var(--mono);font-size:12px;line-height:1.75;overflow-x:auto;white-space:pre-wrap;word-break:break-all;margin-bottom:1rem;color:#86efac}
textarea#ans{width:100%;min-height:110px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:.875rem;font-family:var(--mono);font-size:13px;color:var(--text);resize:none;outline:none;line-height:1.6;transition:border-color .15s}
textarea#ans:focus{border-color:var(--acc)}
.fb{margin:1rem 0 1.5rem;padding:1rem;border-radius:12px;font-size:13px;line-height:1.65;display:none}
.fb.ok{background:rgba(110,231,183,.08);border:1px solid rgba(110,231,183,.2)}
.fb.bad{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18)}
.fb-title{font-family:var(--head);font-size:15px;font-weight:700;margin-bottom:8px}
.fb.ok .fb-title{color:var(--acc)}
.fb.bad .fb-title{color:var(--red)}
.fb pre{font-family:var(--mono);font-size:12px;margin-top:8px;white-space:pre-wrap;word-break:break-all;opacity:.85;background:var(--s3);padding:.75rem;border-radius:8px}
.hint-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:10px}
.hint-txt{font-size:13px;margin-top:4px;color:rgba(232,245,240,.7)}
.action-bar{padding:.875rem 1rem;border-top:1px solid var(--border);background:var(--bg);display:flex;gap:8px;flex-shrink:0}
.btn-check{flex:1;background:var(--acc2);color:#0d0d12;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--head)}
.btn-check:disabled{opacity:.35}
.btn-next{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:14px;color:var(--text);cursor:pointer;font-family:var(--body)}

/* ══════════════════════════════
   STUDY SCREEN
══════════════════════════════ */
#sc-study{flex-direction:column}
.study-topbar{display:flex;align-items:center;gap:8px;padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--s1)}
.study-topbar h2{font-family:var(--head);font-size:16px;font-weight:700;flex:1}
.study-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.chapter-tabs{display:flex;overflow-x:auto;gap:6px;padding:.75rem 1rem .5rem;border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.chapter-tabs::-webkit-scrollbar{display:none}
.ch-tab{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;white-space:nowrap;cursor:pointer;color:var(--muted);font-family:var(--head);font-weight:600;transition:all .15s;flex-shrink:0}
.ch-tab.active{background:var(--acc);color:#0d0d12;border-color:var(--acc)}
.study-content{flex:1;overflow-y:auto;padding:1rem 1rem 5rem}
.study-section{display:none}
.study-section.active{display:block}
.study-section h3{font-family:var(--head);font-size:18px;font-weight:800;margin-bottom:.25rem;color:var(--acc)}
.study-section .intro{font-size:13px;color:var(--muted);margin-bottom:1.25rem;line-height:1.6}
.concept{background:var(--s1);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.concept-header{padding:.875rem 1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
.concept-header .ct{font-family:var(--head);font-size:14px;font-weight:700}
.concept-header .arrow{color:var(--muted);font-size:12px;transition:transform .2s;flex-shrink:0}
.concept.open .arrow{transform:rotate(180deg)}
.concept-body{display:none;padding:0 1rem 1rem;font-size:13px;line-height:1.7;color:rgba(232,245,240,.85)}
.concept.open .concept-body{display:block}
.concept-body pre{font-family:var(--mono);font-size:12px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:.75rem;margin:.6rem 0;white-space:pre-wrap;word-break:break-all;color:#86efac;line-height:1.7}
.concept-body strong{color:var(--acc);font-weight:600}
.concept-body ul{padding-left:1.2rem;margin:.4rem 0}
.concept-body ul li{margin:.25rem 0}
.concept-body .note{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:8px;padding:.6rem .875rem;margin:.6rem 0;font-size:12px;color:rgba(251,191,36,.9)}
.tag-pill{display:inline-block;font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:20px;margin-right:4px;margin-bottom:4px}

/* tag colours */
.tag-output{background:rgba(110,231,183,.12);color:#6ee7b7}
.tag-errors{background:rgba(248,113,113,.12);color:#f87171}
.tag-blanks{background:rgba(251,191,36,.12);color:#fbbf24}
.tag-conversion{background:rgba(96,165,250,.12);color:#60a5fa}
.tag-implement{background:rgba(167,139,250,.12);color:#a78bfa}
.tag-methods{background:rgba(244,114,182,.12);color:#f472b6}
.tag-concepts{background:rgba(52,211,153,.12);color:#34d399}
.tag-jlabels{background:rgba(251,146,60,.12);color:#fb923c}
.tag-persistence{background:rgba(148,163,184,.12);color:#94a3b8}
</style>
</head>
<body>
<div id="app">

<!-- ══ HOME ══ -->
<div id="sc-home" class="screen active">
  <div class="home-header">
    <h1>Entrenador<br><span>Java ☕</span></h1>
    <p>Estudia el temario y practica ejercicios</p>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="n" id="s-done">0</div><div class="l">hechos</div></div>
    <div class="stat-card"><div class="n" id="s-ok">0</div><div class="l">correctos</div></div>
    <div class="stat-card"><div class="n" id="s-pct">—</div><div class="l">acierto</div></div>
  </div>
  <div class="section-label">Temas de práctica</div>
  <div class="topic-grid" id="topic-grid"></div>
</div>

<!-- ══ EXERCISE ══ -->
<div id="sc-exercise" class="screen">
  <div class="ex-topbar">
    <button class="back-btn" onclick="goHome()">← Inicio</button>
    <span class="ex-tag" id="ex-tag"></span>
    <div class="dots" id="ex-dots"></div>
  </div>
  <div class="ex-body" id="ex-body">
    <div class="ex-q" id="ex-q"></div>
    <pre class="code" id="ex-code" style="display:none"></pre>
    <textarea id="ans" placeholder="Escribe tu respuesta aquí..."></textarea>
    <div class="fb" id="fb"></div>
  </div>
  <div class="action-bar">
    <button class="btn-check" id="btn-check" onclick="checkAnswer()">Comprobar</button>
    <button class="btn-next" onclick="nextExercise()">Siguiente →</button>
  </div>
</div>

<!-- ══ STUDY ══ -->
<div id="sc-study" class="screen">
  <div class="study-topbar">
    <h2>📚 Temario</h2>
  </div>
  <div class="study-body">
    <div class="chapter-tabs" id="ch-tabs"></div>
    <div class="study-content" id="study-content"></div>
  </div>
</div>

<!-- ══ NAV ══ -->
<nav>
  <button id="nav-home" class="active" onclick="showScreen('home')">
    <span class="ico">🏠</span>Inicio
  </button>
  <button id="nav-study" onclick="showScreen('study')">
    <span class="ico">📚</span>Estudiar
  </button>
  <button id="nav-exercise" onclick="showScreen('exercise')">
    <span class="ico">✏️</span>Practicar
  </button>
</nav>

</div><!-- #app -->

<script>
/* ═══════════════════════════════════════
   DATA — TOPICS
═══════════════════════════════════════ */
const topics = [
  {id:'output',     label:'Salida pantalla', icon:'🖥️', sub:'¿Qué imprime?',       tag:'output',      color:'#6ee7b7'},
  {id:'errors',     label:'Errores',         icon:'🐛', sub:'Bugs y syntax errors', tag:'errors',      color:'#f87171'},
  {id:'blanks',     label:'Rellenar blancos',icon:'✏️', sub:'Completar código',     tag:'blanks',      color:'#fbbf24'},
  {id:'conversion', label:'Conversiones',    icon:'🔄', sub:'Código equivalente',   tag:'conversion',  color:'#60a5fa'},
  {id:'implement',  label:'Implementar',     icon:'⚙️', sub:'Escribir fragmentos',  tag:'implement',   color:'#a78bfa'},
  {id:'methods',    label:'Crear métodos',   icon:'🔧', sub:'Definir métodos',      tag:'methods',     color:'#f472b6'},
  {id:'concepts',   label:'Conceptos',       icon:'📖', sub:'Explicar términos',    tag:'concepts',    color:'#34d399'},
  {id:'jlabels',    label:'JLabels / GUI',   icon:'🪟', sub:'Interfaces gráficas',  tag:'jlabels',     color:'#fb923c'},
  {id:'persistence',label:'Persistencia BD', icon:'🗄️', sub:'JDBC y BD',            tag:'persistence', color:'#94a3b8'},
];

/* ═══════════════════════════════════════
   DATA — EXERCISES
═══════════════════════════════════════ */
const exercises = {
  output:[
    {q:'¿Cuál es la salida exacta de este código?',
     code:`int x = 5;\nint y = 2;\nSystem.out.println(x + y);\nSystem.out.println(x * y);\nSystem.out.println(x / y);\nSystem.out.println(x % y);`,
     a:'7\n10\n2\n1',
     hint:'División entera entre ints trunca el decimal. 5/2 = 2, no 2.5'},
    {q:'¿Qué imprime este bucle anidado?',
     code:`for (int i = 0; i < 3; i++) {\n    for (int j = i; j < 3; j++) {\n        System.out.print(j + " ");\n    }\n    System.out.println();\n}`,
     a:'0 1 2 \n1 2 \n2 ',
     hint:'El bucle interior empieza en i. Traza: i=0→j=0,1,2 | i=1→j=1,2 | i=2→j=2'},
    {q:'¿Qué imprime este código con Strings?',
     code:`String a = "Hola";\nString b = "Hola";\nString c = new String("Hola");\nSystem.out.println(a == b);\nSystem.out.println(a == c);\nSystem.out.println(a.equals(c));`,
     a:'true\nfalse\ntrue',
     hint:'a y b comparten literal del string pool. c es nuevo objeto en heap. .equals() compara contenido.'},
    {q:'¿Qué imprime este código con casting?',
     code:`double d = 9.99;\nint i = (int) d;\nSystem.out.println(d);\nSystem.out.println(i);\nSystem.out.println((double)(10/3));`,
     a:'9.99\n9\n3.0',
     hint:'(int) trunca, no redondea. 10/3 es división entera primero → 3, luego cast a double → 3.0'},
  ],
  errors:[
    {q:'Este código tiene 2 errores. Identifícalos y corrígelos:',
     code:`public class Ejemplo {\n    public static void main(String[] args) {\n        int[] nums = new int[5];\n        for (int i = 0; i <= 5; i++) {\n            nums[i] = i * 2\n        }\n    }\n}`,
     a:'1) i <= 5 → debe ser i < 5 (ArrayIndexOutOfBoundsException en i=5)\n2) Falta ; al final de: nums[i] = i * 2',
     hint:'Array de tamaño 5 tiene índices 0..4. El <= 5 intenta acceder al índice 5.'},
    {q:'Encuentra el error lógico en este método:',
     code:`public static boolean esPrimo(int n) {\n    for (int i = 2; i < n; i++) {\n        if (n % i == 0) {\n            return true;\n        }\n    }\n    return false;\n}`,
     a:'Los return están invertidos.\nSi n % i == 0 → el número NO es primo → return false.\nAl salir sin divisores → return true.',
     hint:'Si encontramos un divisor exacto, el número NO es primo.'},
    {q:'¿Qué error hay aquí? ¿Cómo se corrige?',
     code:`public class Test {\n    int valor = 10;\n    public static void main(String[] args) {\n        System.out.println(valor);\n    }\n}`,
     a:'Error: no se puede acceder a un atributo de instancia desde un método estático.\nSolución 1: declarar "static int valor = 10;"\nSolución 2: Test t = new Test(); System.out.println(t.valor);',
     hint:'main es static, no pertenece a ningún objeto. No puede acceder a atributos de instancia directamente.'},
  ],
  blanks:[
    {q:'Rellena los blancos para que el método devuelva el mayor de dos números:',
     code:`public static int mayor(int a, int b) {\n    if (a ___ b) {\n        return ___;\n    }\n    return ___;\n}`,
     a:'> , a , b',
     hint:'Si a es mayor que b retorna a, si no retorna b.'},
    {q:'Rellena los blancos para declarar y usar un ArrayList de Strings:',
     code:`import java.util.___;\n\nArrayList<___> lista = new ArrayList<>();\nlista.___(\"Java\");\nString primero = lista.___(0);`,
     a:'ArrayList , String , add , get',
     hint:'ArrayList está en java.util. Métodos: add() para añadir, get(índice) para obtener.'},
    {q:'Completa el constructor de esta clase:',
     code:`public class Persona {\n    String nombre;\n    int edad;\n\n    public ___(String nombre, int edad) {\n        ___.nombre = nombre;\n        ___.edad = edad;\n    }\n}`,
     a:'Persona , this , this',
     hint:'El constructor tiene el mismo nombre que la clase. this distingue atributo del parámetro.'},
  ],
  conversion:[
    {q:'Convierte este for clásico a un for-each equivalente:',
     code:`String[] frutas = {"manzana", "pera", "uva"};\nfor (int i = 0; i < frutas.length; i++) {\n    System.out.println(frutas[i]);\n}`,
     a:'for (String fruta : frutas) {\n    System.out.println(fruta);\n}',
     hint:'For-each: for (Tipo var : coleccion). Sin índice ni .length'},
    {q:'Convierte el if-else a operador ternario:',
     code:`int edad = 20;\nString estado;\nif (edad >= 18) {\n    estado = "mayor";\n} else {\n    estado = "menor";\n}`,
     a:'String estado = (edad >= 18) ? "mayor" : "menor";',
     hint:'condición ? valorSiTrue : valorSiFalse'},
    {q:'Convierte este while a un for equivalente:',
     code:`int i = 0;\nwhile (i < 5) {\n    System.out.println(i);\n    i++;\n}`,
     a:'for (int i = 0; i < 5; i++) {\n    System.out.println(i);\n}',
     hint:'El for agrupa init, condición e incremento en una sola línea.'},
  ],
  implement:[
    {q:'Implementa un bucle que imprima los números del 1 al 10 que sean pares.',
     code:'',
     a:'for (int i = 1; i <= 10; i++) {\n    if (i % 2 == 0) {\n        System.out.println(i);\n    }\n}',
     hint:'Usa i % 2 == 0 para comprobar si es par.'},
    {q:'Implementa el código para invertir un String sin funciones auxiliares.',
     code:`String original = "Java";\nString invertido = "";\n// Tu código aquí`,
     a:'for (int i = original.length() - 1; i >= 0; i--) {\n    invertido += original.charAt(i);\n}',
     hint:'Recorre el String de atrás hacia adelante con charAt(i).'},
    {q:'Implementa un método que cuente cuántas veces aparece una letra en un String.',
     code:`// contar("programacion", 'a') → 3`,
     a:`public static int contar(String texto, char letra) {\n    int count = 0;\n    for (int i = 0; i < texto.length(); i++) {\n        if (texto.charAt(i) == letra) count++;\n    }\n    return count;\n}`,
     hint:'Recorre con charAt(i) y compara con == para char.'},
  ],
  methods:[
    {q:'Crea un método estático que reciba un array de enteros y devuelva la suma.',
     code:'',
     a:'public static int suma(int[] arr) {\n    int total = 0;\n    for (int n : arr) {\n        total += n;\n    }\n    return total;\n}',
     hint:'static, retorna int, parámetro int[]. Puedes usar for-each.'},
    {q:'Crea un método que devuelva true si un String es palíndromo.',
     code:'',
     a:'public static boolean esPalindromo(String s) {\n    String inv = new StringBuilder(s).reverse().toString();\n    return s.equals(inv);\n}',
     hint:'StringBuilder.reverse() o comparar desde los extremos con charAt().'},
    {q:'Crea un método que reciba un entero y devuelva true si es par.',
     code:'',
     a:'public static boolean esPar(int n) {\n    return n % 2 == 0;\n}',
     hint:'n % 2 == 0 → es par.'},
  ],
  concepts:[
    {q:'¿Qué es la herencia en Java? Da un ejemplo con las palabras clave correctas.',
     code:'',
     a:'La herencia permite que una subclase herede atributos y métodos de una superclase.\nPalabra clave: extends\n\npublic class Animal { ... }\npublic class Perro extends Animal { ... }\n\nPerro hereda todo lo public/protected de Animal.\nsuper() llama al constructor padre.',
     hint:'Palabras clave: extends, super, @Override'},
    {q:'Explica la diferencia entre == y .equals() para Strings.',
     code:'',
     a:'== compara referencias (misma dirección de memoria).\n.equals() compara el contenido (los caracteres).\n\nPara comparar valores de Strings SIEMPRE usar .equals()',
     hint:'Los Strings son objetos. == compara direcciones de memoria.'},
    {q:'¿Qué es una excepción y cómo se gestiona?',
     code:'',
     a:'Una excepción es un error en tiempo de ejecución.\n\ntry {\n    // código que puede fallar\n} catch (TipoException e) {\n    // manejo del error\n} finally {\n    // siempre se ejecuta\n}',
     hint:'try → código arriesgado. catch → captura el error. finally → siempre se ejecuta.'},
  ],
  jlabels:[
    {q:'Crea un JFrame básico con un JLabel "Hola Mundo" centrado.',
     code:`import javax.swing.*;\npublic class Ventana {\n    public static void main(String[] args) {\n        // Tu código\n    }\n}`,

let currentTopic = null;
let currentEx    = null;
let usedIdx      = {};
let stats        = {done:0, ok:0};
let activeChapter = 'basico';

/* ═══════════════════════════════════════
   SCREENS
═══════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('sc-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
}
function goHome() { showScreen('home'); }

/* ═══════════════════════════════════════
   HOME — RENDER TOPICS
═══════════════════════════════════════ */
function renderTopics() {
  const g = document.getElementById('topic-grid');
  g.innerHTML = topics.map(t => {
    const cnt = (exercises[t.id]||[]).length;
    return `<div class="topic-card" style="--bar-color:${t.color}" onclick="startTopic('${t.id}')">
      <span class="badge">${cnt} ejerc.</span>
      <span class="ico">${t.icon}</span>
      <div class="name">${t.label}</div>
      <div class="sub">${t.sub}</div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════════
   EXERCISE LOGIC
═══════════════════════════════════════ */
function startTopic(id) {
  currentTopic = id;
  if (!usedIdx[id]) usedIdx[id] = [];
  showScreen('exercise');
  loadExercise(id);
}

function loadExercise(id) {
  const list = exercises[id] || [];
  let avail = list.map((_,i)=>i).filter(i => !usedIdx[id].includes(i));
  if (!avail.length) { usedIdx[id]=[]; avail=list.map((_,i)=>i); }
  const idx = avail[Math.floor(Math.random()*avail.length)];
  usedIdx[id].push(idx);
  currentEx = {...list[idx], topicId:id};
  renderExercise(list.length);
}

function renderExercise(total) {
  const t = topics.find(x => x.id === currentEx.topicId);
  const tagEl = document.getElementById('ex-tag');
  tagEl.textContent = t.label;
  tagEl.className = 'ex-tag tag-' + t.tag;

  const used = usedIdx[currentEx.topicId].length;
  document.getElementById('ex-dots').innerHTML =
    Array.from({length:Math.min(total,7)},(_,i) =>
      `<div class="dot ${i < used ? 'on':''}"></div>`).join('');

  document.getElementById('ex-q').textContent = currentEx.q;
  const ce = document.getElementById('ex-code');
  if (currentEx.code && currentEx.code.trim()) {
    ce.textContent = currentEx.code; ce.style.display='block';
  } else { ce.style.display='none'; }

  document.getElementById('ans').value = '';
  const fb = document.getElementById('fb');
  fb.style.display='none'; fb.className='fb';
  document.getElementById('btn-check').disabled = false;
  document.getElementById('ex-body').scrollTop = 0;
}

function checkAnswer() {
  const user = (document.getElementById('ans').value||'').trim();
  if (!user) return;
  stats.done++;
  const norm = s => s.toLowerCase().replace(/\s+/g,' ').trim();
  const ok = norm(user) === norm(currentEx.a);
  if (ok) stats.ok++;
  updateStats();
  const fb = document.getElementById('fb');
  if (ok) {
    fb.className='fb ok';
    fb.innerHTML='<div class="fb-title">✓ Correcto</div>Tu respuesta coincide con la solución.';
  } else {
    fb.className='fb bad';
    fb.innerHTML=`<div class="fb-title">✗ Revisa tu respuesta</div>
<span style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Solución esperada</span>
<pre>${esc(currentEx.a)}</pre>
<div class="hint-lbl">💡 Pista</div>
<div class="hint-txt">${currentEx.hint}</div>`;
  }
  fb.style.display='block';
  document.getElementById('btn-check').disabled=true;
  setTimeout(()=>fb.scrollIntoView({behavior:'smooth',block:'nearest'}),80);
}

function nextExercise() {
  if (currentTopic) loadExercise(currentTopic);
}

function updateStats() {
  document.getElementById('s-done').textContent = stats.done;
  document.getElementById('s-ok').textContent   = stats.ok;
  document.getElementById('s-pct').textContent  = stats.done > 0
    ? Math.round(stats.ok/stats.done*100)+'%' : '—';
}

/* ═══════════════════════════════════════
   STUDY LOGIC
═══════════════════════════════════════ */
function renderStudy() {
  // tabs
  document.getElementById('ch-tabs').innerHTML = chapters.map(c =>
    `<div class="ch-tab ${c.id===activeChapter?'active':''}" onclick="selectChapter('${c.id}')">${c.label}</div>`
  ).join('');

  // content
  const cont = document.getElementById('study-content');
  cont.innerHTML = chapters.map(c => {
    const ch = studyContent[c.id];
    return `<div class="study-section ${c.id===activeChapter?'active':''}" id="ch-${c.id}">
      <h3>${ch.title}</h3>
      <p class="intro">${ch.intro}</p>
      ${ch.concepts.map((con,i) => `
        <div class="concept ${i===0?'open':''}" id="con-${c.id}-${i}">
          <div class="concept-header" onclick="toggleConcept('con-${c.id}-${i}')">
            <span class="ct">${con.title}</span>
            <span class="arrow">▼</span>
          </div>
          <div class="concept-body">${con.body}</div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

function selectChapter(id) {
  activeChapter = id;
  document.querySelectorAll('.ch-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.study-section').forEach(s => s.classList.remove('active'));
  document.querySelector(`.ch-tab[onclick="selectChapter('${id}')"]`).classList.add('active');
  document.getElementById('ch-'+id).classList.add('active');
  document.getElementById('study-content').scrollTop = 0;
}

function toggleConcept(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
renderTopics();
renderStudy();
</script>
